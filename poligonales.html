<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COTA100 - Hub Poligonales</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #000000;
            --primary-color: #FF6600; --border-color: rgba(0, 0, 0, 0.2); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-color); color: var(--text-color); padding-bottom: 80px;
            /* MAPA GEOMÉTRICO RAW TECH (Triangulaciones y polígonos) */
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23000000' stroke-opacity='0.10' stroke-width='1.5'%3E%3Cpolygon points='50,50 150,20 200,100 120,150' /%3E%3Cpolygon points='250,250 350,200 380,300 280,350' /%3E%3Cpolygon points='50,250 20,350 150,380 180,300' /%3E%3Cpolygon points='250,50 380,80 320,180 220,150' /%3E%3Cline x1='150' y1='20' x2='250' y2='50' /%3E%3Cline x1='200' y1='100' x2='220' y2='150' /%3E%3Cline x1='120' y1='150' x2='180' y2='300' /%3E%3Cline x1='250' y1='250' x2='220' y2='150' /%3E%3Cline x1='250' y1='250' x2='180' y2='300' /%3E%3Ccircle cx='50' cy='50' r='3' fill='%23000' fill-opacity='0.1' /%3E%3Ccircle cx='150' cy='20' r='3' fill='%23000' fill-opacity='0.1' /%3E%3Ccircle cx='200' cy='100' r='3' fill='%23000' fill-opacity='0.1' /%3E%3Ccircle cx='120' cy='150' r='3' fill='%23000' fill-opacity='0.1' /%3E%3C/g%3E%3C/svg%3E");
            background-size: 400px 400px;
        }

        .top-bar { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; border-bottom: 2px solid var(--border-color);
            background-color: rgba(255, 255, 255, 0.9); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px);
        }
        .btn-volver-mini { background: transparent; border: none; color: var(--text-color); font-size: 2rem; font-weight: 800; cursor: pointer; line-height: 1; text-decoration: none;}
        .top-bar-title { color: var(--text-color); font-weight: 800; font-size: 1.5rem; text-transform: uppercase; margin: 0; }
        .top-bar-title span { color: var(--primary-color); }

        .hub-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px 15px; }
        
        .btn-hub {
            background-color: rgba(255, 255, 255, 0.85); border: 2px solid var(--border-color);
            border-radius: 12px; padding: 25px 15px; display: flex; align-items: center;
            text-decoration: none; color: var(--text-color); cursor: pointer;
            backdrop-filter: blur(5px); transition: 0.2s; position: relative; overflow: hidden;
        }
        .btn-hub:active { border-color: var(--primary-color); background-color: #fff; transform: scale(0.97); }
        .btn-hub .hub-icon { font-size: 3.5rem; margin-right: 20px; text-shadow: 0 0 5px #fff; }
        .hub-info { text-align: left; }
        .hub-info h3 { font-size: 1.4rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 0 5px #fff;}
        .hub-info p { font-size: 0.9rem; font-weight: 600; color: #444; line-height: 1.2; text-shadow: 0 0 5px #fff;}
    /* --- AJUSTE COMPACTO PARA PANTALLAS MÓVILES PEQUEÑAS --- */
        @media screen and (max-width: 480px) {
            html { font-size: 13px; } /* Reduce todos los textos un 18% automáticamente */
            .btn-accion { padding: 10px; font-size: 0.95rem; }
            input, select { padding: 8px; font-size: 1rem; }
            .panel-control { padding: 10px; margin-bottom: 10px;}
            .top-bar { padding: 8px 15px; height: 60px; }
            .btn-volver-mini { width: 35px; height: 35px; font-size: 1.5rem;}
            .header h1 { font-size: 2.2rem; }
            .grid-container { gap: 10px; padding: 10px; }
            .card { min-height: 120px; padding: 10px; }
            .icon-container { height: 45px; margin-bottom: 5px; }
            .icon-container svg { width: 35px; height: 35px; }
            .btn-calculadora-flotante, .btn-flotante { width: 50px; height: 50px; bottom: 15px; right: 15px;}
            .calculadora-modal { right: 15px; bottom: 75px; width: 240px; padding: 10px;}
            #calcDisplay { height: 40px; font-size: 1.4rem; padding: 5px;}
            .calc-grid button { padding: 8px 0; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="btn-volver-mini">←</a>
        <h2 class="top-bar-title">MÓDULOS <span>POLIGONALES</span></h2>
        <div style="width: 25px;"></div>
    </div>

    <div class="hub-grid">
        <a href="pol-cerrada.html" class="btn-hub">
            <div class="hub-icon">⬡</div>
            <div class="hub-info">
                <h3>Poligonal Cerrada</h3>
                <p>Ajuste de circuitos cerrados. Cálculo de error angular, lineal y compensación de coordenadas.</p>
            </div>
        </a>
        
        <a href="pol-abierta.html" class="btn-hub">
            <div class="hub-icon">📈</div>
            <div class="hub-info">
                <h3>Abierta / Encuadrada</h3>
                <p>Poligonales con control de azimut de partida y llegada. Ajuste sobre línea base conocida.</p>
            </div>
        </a>
    </div>

</body>
</html>
