<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COTA100 SYSTEM - Módulos de Poligonales</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS UNIFICADOS (Idénticos a Nivelación) --- */
        :root {
            --bg-color: #ffffff; --text-color: #000000;
            --primary-color: #FF6600; --border-color: rgba(0, 0, 0, 0.2); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px;
            /* Fondo de Polígonos con la opacidad corregida al 5% para coincidir con Nivelación */
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23000000' stroke-opacity='0.05' stroke-width='1.5'%3E%3Cpolygon points='50,50 150,20 200,100 120,150' /%3E%3Cpolygon points='250,250 350,200 380,300 280,350' /%3E%3Cpolygon points='50,250 20,350 150,380 180,300' /%3E%3Cpolygon points='250,50 380,80 320,180 220,150' /%3E%3Cpath d='M150,20 L250,50 M200,100 L220,150 M120,150 L180,300 M250,250 L220,150 M250,250 L180,300' /%3E%3Ccircle cx='50' cy='50' r='3' fill='%23000' fill-opacity='0.1' /%3E%3Ccircle cx='150' cy='20' r='3' fill='%23000' fill-opacity='0.1' /%3E%3Ccircle cx='200' cy='100' r='3' fill='%23000' fill-opacity='0.1' /%3E%3Ccircle cx='120' cy='150' r='3' fill='%23000' fill-opacity='0.1' /%3E%3C/g%3E%3C/svg%3E");
            background-size: 400px 400px; background-attachment: fixed;
        }

        /* --- CABECERA --- */
        .top-bar { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; border-bottom: 2px solid var(--border-color);
            background-color: rgba(255, 255, 255, 0.95); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .btn-volver-mini { 
            background: rgba(0,0,0,0.03); border: 2px solid var(--border-color); color: var(--text-color); 
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; transition: 0.2s;
        }
        .btn-volver-mini:active { background: var(--text-color); color: var(--bg-color); transform: scale(0.95); }
        .top-bar-title { color: var(--text-color); font-weight: 800; font-size: 1.4rem; text-transform: uppercase; margin: 0; text-align: center; line-height: 1.1;}
        .top-bar-title span { color: var(--primary-color); display: block; font-size: 0.85rem;}
        
        /* Espacio reservado invisible a la derecha para mantener el título centrado */
        .top-bar-spacer { width: 45px; height: 45px; }

        .modulo-container { padding: 15px; animation: slideIn 0.3s ease-out forwards; display: flex; flex-direction: column; gap: 15px;}
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- TARJETAS HORIZONTALES UNIFICADAS --- */
        .card-horizontal {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.95); 
            border: 2px solid var(--border-color); border-radius: 16px; padding: 20px 15px; 
            text-decoration: none; color: var(--text-color); box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            transition: 0.2s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(10px);
        }
        .card-horizontal:active { transform: scale(0.96); border-color: var(--primary-color); background: #fff;}
        
        .icon-box {
            width: 60px; height: 60px; display: flex; justify-content: center; align-items: center;
            color: var(--primary-color); margin-right: 15px; flex-shrink: 0;
            background: rgba(255,102,0,0.05); border-radius: 12px; border: 1px solid rgba(255,102,0,0.1);
            transition: 0.2s;
        }
        .card-horizontal:active .icon-box { background: var(--primary-color); color: #fff;}
        
        .text-box { display: flex; flex-direction: column; }
        .text-box h3 { font-size: 1.15rem; font-weight: 800; margin: 0 0 4px 0; text-transform: uppercase; letter-spacing: 0.5px;}
        .text-box p { font-size: 0.85rem; color: #666; font-weight: 600; margin: 0; line-height: 1.3;}

        /* Ajuste móvil */
        @media screen and (max-width: 480px) {
            html { font-size: 13px; }
            .top-bar { padding: 10px 15px; height: 60px;}
            .btn-volver-mini { width: 35px; height: 35px;}
            .top-bar-spacer { width: 35px; height: 35px; }
            .card-horizontal { padding: 15px 12px; }
            .icon-box { width: 50px; height: 50px; margin-right: 12px; }
            .icon-box svg { width: 28px; height: 28px; }
        }

        /* --- SINCRONIZACIÓN DE MODO OSCURO --- */
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --border-color: rgba(255, 255, 255, 0.15);
        }
        body.dark-mode .top-bar { background-color: rgba(30, 30, 30, 0.95); }
        body.dark-mode .card-horizontal { background: rgba(30, 30, 30, 0.95); }
        body.dark-mode .card-horizontal:active { background: #1a1a1a; }
        body.dark-mode .text-box p { color: #aaa; }
        body.dark-mode .btn-volver-mini { background: rgba(255, 255, 255, 0.05); }
        body.dark-mode {
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-opacity='0.05' stroke-width='1.5'%3E%3Cpolygon points='50,50 150,20 200,100 120,150' /%3E%3Cpolygon points='250,250 350,200 380,300 280,350' /%3E%3Cpolygon points='50,250 20,350 150,380 180,300' /%3E%3Cpolygon points='250,50 380,80 320,180 220,150' /%3E%3Cpath d='M150,20 L250,50 M200,100 L220,150 M120,150 L180,300 M250,250 L220,150 M250,250 L180,300' /%3E%3Ccircle cx='50' cy='50' r='3' fill='%23fff' fill-opacity='0.05' /%3E%3Ccircle cx='150' cy='20' r='3' fill='%23fff' fill-opacity='0.05' /%3E%3Ccircle cx='200' cy='100' r='3' fill='%23fff' fill-opacity='0.05' /%3E%3Ccircle cx='120' cy='150' r='3' fill='%23fff' fill-opacity='0.05' /%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>
<body>

    <script>
        try {
            let conf = JSON.parse(localStorage.getItem('cota100_ajustes'));
            if (conf && conf.darkMode) document.body.classList.add('dark-mode');
        } catch(e) { console.log("Error al cargar ajustes."); }
    </script>

    <div class="top-bar">
        <a href="index.html" class="btn-volver-mini">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="top-bar-title">POLIGONALES <span>Módulos de Cálculo</span></h2>
        <div class="top-bar-spacer"></div>
    </div>

    <div class="modulo-container">
        
        <a href="pol-cerrada.html" class="card-horizontal">
            <div class="icon-box">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>
                </svg>
            </div>
            <div class="text-box">
                <h3>Poligonal Cerrada</h3>
                <p>Ajuste de circuitos cerrados. Cálculo de error angular, lineal y compensación de coordenadas.</p>
            </div>
        </a>

        <a href="pol-abierta.html" class="card-horizontal">
            <div class="icon-box">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 17 9 11 15 15 21 7"></polyline>
                    <circle cx="3" cy="17" r="2"></circle>
                    <circle cx="9" cy="11" r="2"></circle>
                    <circle cx="15" cy="15" r="2"></circle>
                    <circle cx="21" cy="7" r="2"></circle>
                </svg>
            </div>
            <div class="text-box">
                <h3>Abierta / Encuadrada</h3>
                <p>Poligonales con control de azimut de partida y llegada. Ajuste sobre línea base conocida.</p>
            </div>
        </a>

    </div>

</body>
</html>
