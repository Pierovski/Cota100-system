<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COTA100 SYSTEM - Raw Tech Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --primary-color: #FF6600; 
            --primary-metallic-light: #FF8833; 
            --border-color: rgba(0, 0, 0, 0.2); 
            --card-bg: rgba(255, 255, 255, 0.85);
            --danger-color: #d32f2f;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --border-color: rgba(255, 255, 255, 0.15);
            --card-bg: rgba(30, 30, 30, 0.85);
        }
        body.dark-mode .header h1 { color: #ffffff; }
        body.dark-mode .card span { color: #e0e0e0; }
        body.dark-mode .card:active .icon-container { color: #ffffff; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding-bottom: 30px; 
            transition: background-color 0.3s, color 0.3s;
            background-image: url("data:image/svg+xml,%3Csvg width='600' height='600' viewBox='0 0 800 800' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23888888' stroke-opacity='0.15'%3E%3Cpath stroke-width='2.5' d='M0 150c100-20 150 50 250 40s150-80 300-60 200 100 250 80v-210H0z'/%3E%3Cpath stroke-width='2.5' d='M0 450c150 50 250-50 400 0s200 150 400 100'/%3E%3Cpath stroke-width='2.5' d='M250 250c30-40 80-20 100 20s-20 80-60 60-60-50-40-80z'/%3E%3Cpath stroke-width='0.8' d='M0 200c110-15 160 55 260 45s160-85 310-65 210 105 230 85'/%3E%3Cpath stroke-width='0.8' d='M0 250c120-10 170 60 270 50s170-90 320-70 220 110 210 90'/%3E%3Cpath stroke-width='0.8' d='M0 300c130-5 180 65 280 55s180-95 330-75 230 115 190 95'/%3E%3Cpath stroke-width='0.8' d='M0 350c140 0 190 70 290 60s190-100 340-80 240 120 170 100'/%3E%3Cpath stroke-width='0.8' d='M0 400c145 25 220 10 345 30s195-50 370 10'/%3E%3Cpath stroke-width='0.8' d='M230 230c40-50 100-30 120 20s-20 100-80 80-70-60-40-100z'/%3E%3Cpath stroke-width='0.8' d='M210 210c50-60 120-40 140 20s-20 120-100 100-80-70-40-120z'/%3E%3Cpath stroke-width='0.8' d='M190 190c60-70 140-50 160 20s-20 140-120 120-90-80-40-140z'/%3E%3Cpath stroke-width='0.8' d='M600 300c40-20 80 0 90 40s-30 60-70 40-40-50-20-80z'/%3E%3Cpath stroke-width='0.8' d='M580 280c50-30 100-10 110 40s-40 80-90 60-50-60-20-100z'/%3E%3Cpath stroke-width='2.5' d='M560 260c60-40 120-20 130 40s-50 100-110 80-60-70-20-120z'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 600px 600px;
            background-position: center;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); z-index: 9999;
            display: flex; align-items: center; justify-content: center; transition: background-color 0.3s;
        }

        .splash-animar { animation: fadeOutSplash 0.4s ease-in-out 1.5s forwards; }
        #splash-screen img { width: 180px; height: auto; }
        .logo-animar { animation: pulseLogo 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes pulseLogo {
            0% { transform: scale(0.8); opacity: 0; filter: drop-shadow(0 0 0px var(--primary-color)); }
            50% { filter: drop-shadow(0 0 30px var(--primary-color)); }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 0px var(--primary-color)); }
        }

        @keyframes fadeOutSplash {
            100% { opacity: 0; visibility: hidden; pointer-events: none; z-index: -1; }
        }

        /* --- PANTALLA DE BLOQUEO --- */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); z-index: 10000;
            display: none; align-items: center; justify-content: center; 
            backdrop-filter: blur(10px); transition: opacity 0.4s;
        }
        .lock-box {
            background: var(--card-bg); border: 2px solid var(--border-color);
            border-radius: 16px; padding: 30px 20px; text-align: center;
            width: 90%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .lock-box input {
            width: 100%; padding: 15px; font-size: 2rem; letter-spacing: 15px;
            font-weight: 900; text-align: center; background: var(--input-bg);
            border: 2px solid var(--border-color); border-radius: 8px;
            color: var(--text-color); margin-bottom: 20px; outline: none; transition: 0.2s;
        }
        .lock-box input:focus { border-color: var(--primary-color); }
        .btn-ingresar {
            width: 100%; padding: 15px; font-size: 1.2rem; font-weight: 800;
            background: var(--primary-color); color: #fff; border: none;
            border-radius: 8px; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-ingresar:active { transform: scale(0.95); }

        .header { text-align: center; padding: 40px 20px 20px; background-color: transparent; border-bottom: 2px solid var(--border-color); }
        .header h1 { color: var(--text-color); font-weight: 800; font-size: 2.8rem; letter-spacing: -1px; margin-bottom: 0; text-transform: uppercase; transition: color 0.3s;}
        .header h1 span { color: var(--primary-color); }
        .header p { color: #888; font-size: 0.95rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; margin-top: -5px;}

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px 15px; }
        
        @keyframes fluidEntrance {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card {
            background-color: var(--card-bg); border: 2px solid var(--border-color); border-radius: 16px;
            padding: 20px 10px; text-align: center; text-decoration: none; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 150px; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden; backdrop-filter: blur(5px); opacity: 0; 
        }

        .card-animar { animation: fluidEntrance 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .card-visible { opacity: 1; }

        .card-animar:nth-child(1) { animation-delay: 1.5s; } 
        .card-animar:nth-child(2) { animation-delay: 1.55s; }
        .card-animar:nth-child(3) { animation-delay: 1.6s; }
        .card-animar:nth-child(4) { animation-delay: 1.65s; }
        .card-animar:nth-child(5) { animation-delay: 1.7s; }
        .card-animar:nth-child(6) { animation-delay: 1.75s; }

        .card:active { transform: scale(0.96); border-color: var(--primary-color); background-color: var(--bg-color); }
        
        .card::after {
            content: ""; position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: radial-gradient(circle, var(--primary-metallic-light) 0%, rgba(255,102,0,0) 70%);
            border-radius: 50%; opacity: 0; transform: translate(-50%, -50%); transition: none; z-index: -1; 
        }
        .card:active::after { animation: metallicPulse 0.4s ease-out; opacity: 1; }

        @keyframes metallicPulse {
            0% { width: 10px; height: 10px; opacity: 0.9; }
            100% { width: 400px; height: 400px; opacity: 0; }
        }

        .icon-container { height: 70px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; width: 100%; color: var(--primary-color); transition: color 0.2s, transform 0.2s; }
        .card:active .icon-container { color: #111; transform: scale(1.1); }
        .card span { font-size: clamp(1.0rem, 3.5vw, 1.2rem); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2; color: var(--text-color); z-index: 1; transition: color 0.2s; }
        .card:active span { color: var(--primary-color) !important; }

        .footer-firma { text-align: center; margin: 20px 0 30px; font-family: 'Rajdhani', sans-serif; line-height: 1.1; }
        .created-by { font-size: 0.8rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .author-name { font-size: 0.95rem; font-weight: 800; color: var(--primary-color); text-transform: uppercase; letter-spacing: 1px; display: block; margin-top: 2px; }

        @media screen and (max-width: 480px) {
            html { font-size: 13px; } 
            .header h1 { font-size: 2.5rem; }
            .grid-container { gap: 10px; padding: 10px; }
            .card { min-height: 130px; padding: 10px; }
            .icon-container { height: 50px; margin-bottom: 8px; }
            .icon-container svg { width: 40px; height: 40px; }
        }       
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>

    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js');
            });
        }

        const claveCorrecta = "2508";

        function verificarClave() {
            const input = document.getElementById('pinInput').value;
            const errorMsg = document.getElementById('errorMsg');
            if (input === claveCorrecta) {
                sessionStorage.setItem('cota100_auth', 'true');
                document.getElementById('lock-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = "none";
                    iniciarAppVisual();
                }, 400);
            } else {
                errorMsg.style.display = 'block';
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]); // Vibración de error
                document.getElementById('pinInput').value = "";
            }
        }

        function iniciarAppVisual() {
            document.getElementById('main-header').style.opacity = "1";
            document.getElementById('main-grid').style.opacity = "1";
            document.getElementById('main-footer').style.opacity = "1";
            
            const splash = document.getElementById('splash-screen');
            const logo = splash.querySelector('img');
            const cards = document.querySelectorAll('.card');

            if (!sessionStorage.getItem('splashMostrado')) {
                splash.classList.add('splash-animar');
                logo.classList.add('logo-animar');
                cards.forEach(card => card.classList.add('card-animar'));
                sessionStorage.setItem('splashMostrado', 'true');
            } else {
                splash.style.display = 'none';
                cards.forEach(card => card.classList.add('card-visible'));
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            // Revisar si ya ingresó el PIN en esta sesión
            if (sessionStorage.getItem('cota100_auth') !== 'true') {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('lock-screen').style.display = 'flex';
            } else {
                iniciarAppVisual();
            }
        });
    </script>
</body>
