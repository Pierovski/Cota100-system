<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COTA100 - Sistema Topográfico</title>
    
    <!-- Enlace al Manifest para que sea instalable como App -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #ffffff; 
            --text-color: #111111;
            --primary-color: #FF6600; 
            --border-color: rgba(0, 0, 0, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-color); color: var(--text-color);
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23000000' stroke-opacity='0.03' fill='none'%3E%3Cpath d='M0 200h400M200 0v400' stroke-width='2'/%3E%3Ccircle cx='200' cy='200' r='100' stroke-width='2'/%3E%3C/g%3E%3C/svg%3E");
            background-attachment: fixed; min-height: 100vh; display: flex; flex-direction: column;
        }

        .header {
            background: #111; color: #fff; padding: 30px 20px 40px;
            border-bottom: 4px solid var(--primary-color);
            text-align: center; border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .header h1 { font-size: 2.8rem; font-weight: 800; margin: 0; letter-spacing: 1px; }
        .header h1 span { color: var(--primary-color); }
        .header p { font-size: 1rem; color: #aaa; font-weight: 600; text-transform: uppercase; margin-top: 5px; }

        .dashboard {
            padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 20px;
            margin-top: -20px; z-index: 10;
        }

        .grid-modulos {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.95); border: 2px solid var(--border-color);
            border-radius: 16px; padding: 20px 15px; text-decoration: none; color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); backdrop-filter: blur(10px);
        }

        .card:active { transform: scale(0.95); border-color: var(--primary-color); }

        .icon-box {
            width: 60px; height: 60px; background: rgba(255,102,0,0.1); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: var(--primary-color); margin-bottom: 15px; border: 2px solid rgba(255,102,0,0.2);
        }

        .card h3 { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 0.8rem; font-weight: 600; color: #666; line-height: 1.2;}

        .card-full { grid-column: span 2; flex-direction: row; text-align: left; padding: 15px 20px; gap: 15px;}
        .card-full .icon-box { margin-bottom: 0; width: 50px; height: 50px; background: #111; color: #fff; border-color: #111;}
        .card-full:active { border-color: #111; }

        /* Estado del Operador Local */
        .status-bar {
            background: #fff; border: 2px solid var(--border-color); border-radius: 12px;
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .status-info { display: flex; flex-direction: column; }
        .status-label { font-size: 0.75rem; font-weight: 800; color: #666; text-transform: uppercase; }
        .status-value { font-size: 1.1rem; font-weight: 800; color: var(--primary-color); }

    </style>
</head>
<body>

    <div class="header">
        <h1>COTA<span>100</span></h1>
        <p>Registros Topográficos Personales</p>
    </div>

    <div class="dashboard">

        <!-- Barra de Estado Dinámica -->
        <div class="status-bar">
            <div class="status-info">
                <span class="status-label">Obra Activa</span>
                <span class="status-value" id="displayProyecto">Sin Asignar</span>
            </div>
            <div class="status-info" style="text-align: right;">
                <span class="status-label">Operador</span>
                <span class="status-value" id="displayOperador" style="color: #111;">-</span>
            </div>
        </div>

        <div class="grid-modulos">
            <!-- Módulo: Nivelación -->
            <a href="nivelacion.html" class="card">
                <div class="icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 5 18 3-9h5"/></svg>
                </div>
                <h3>Nivelación</h3>
                <p>Circuitos y Control Altimétrico</p>
            </a>

            <!-- Módulo: Poligonales (Ejemplo para tu futuro código) -->
            <a href="#" class="card" style="opacity: 0.6;">
                <div class="icon-box" style="color: #666; border-color: rgba(0,0,0,0.1); background: rgba(0,0,0,0.05);">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
                </div>
                <h3>Poligonales</h3>
                <p>Próximamente</p>
            </a>

            <!-- Módulo: Ajustes (Ocupa las dos columnas) -->
            <a href="ajustes.html" class="card card-full">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </div>
                <div>
                    <h3>Ajustes del Sistema</h3>
                    <p>Configurar proyecto, tolerancias y PWA</p>
                </div>
            </a>
        </div>
    </div>

    <!-- Script de PWA y lectura de LocalStorage -->
    <script>
        // Registrar el Service Worker para funcionamiento Offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado con éxito: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('Error al registrar el ServiceWorker: ', error);
                    });
            });
        }

        // Cargar los nombres desde los ajustes al abrir la pantalla
        window.addEventListener('DOMContentLoaded', () => {
            let conf = JSON.parse(localStorage.getItem('cota100_ajustes'));
            if(conf) {
                if(conf.proyecto) {
                    let text = conf.proyecto;
                    document.getElementById('displayProyecto').innerText = text.length > 15 ? text.substring(0, 15) + '...' : text;
                }
                if(conf.operador) document.getElementById('displayOperador').innerText = conf.operador;
            }
        });
    </script>
</body>
</html>
