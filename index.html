<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COTA100 SYSTEM - Raw Tech Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --primary-color: #FF6600; 
            --primary-metallic-light: #FF8833; 
            --border-color: rgba(0, 0, 0, 0.2); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding-bottom: 30px; 
            /* MAPA TOPOGRÁFICO REALISTA */
            background-image: url("data:image/svg+xml,%3Csvg width='600' height='600' viewBox='0 0 800 800' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23000000' stroke-opacity='0.15'%3E%3Cpath stroke-width='2.5' d='M0 150c100-20 150 50 250 40s150-80 300-60 200 100 250 80v-210H0z'/%3E%3Cpath stroke-width='2.5' d='M0 450c150 50 250-50 400 0s200 150 400 100'/%3E%3Cpath stroke-width='2.5' d='M250 250c30-40 80-20 100 20s-20 80-60 60-60-50-40-80z'/%3E%3Cpath stroke-width='0.8' d='M0 200c110-15 160 55 260 45s160-85 310-65 210 105 230 85'/%3E%3Cpath stroke-width='0.8' d='M0 250c120-10 170 60 270 50s170-90 320-70 220 110 210 90'/%3E%3Cpath stroke-width='0.8' d='M0 300c130-5 180 65 280 55s180-95 330-75 230 115 190 95'/%3E%3Cpath stroke-width='0.8' d='M0 350c140 0 190 70 290 60s190-100 340-80 240 120 170 100'/%3E%3Cpath stroke-width='0.8' d='M0 400c145 25 220 10 345 30s195-50 370 10'/%3E%3Cpath stroke-width='0.8' d='M230 230c40-50 100-30 120 20s-20 100-80 80-70-60-40-100z'/%3E%3Cpath stroke-width='0.8' d='M210 210c50-60 120-40 140 20s-20 120-100 100-80-70-40-120z'/%3E%3Cpath stroke-width='0.8' d='M190 190c60-70 140-50 160 20s-20 140-120 120-90-80-40-140z'/%3E%3Cpath stroke-width='0.8' d='M600 300c40-20 80 0 90 40s-30 60-70 40-40-50-20-80z'/%3E%3Cpath stroke-width='0.8' d='M580 280c50-30 100-10 110 40s-40 80-90 60-50-60-20-100z'/%3E%3Cpath stroke-width='2.5' d='M560 260c60-40 120-20 130 40s-50 100-110 80-60-70-20-120z'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 600px 600px;
            background-position: center;
        }

        /* --- SPLASH SCREEN (LOGO PURO) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .splash-animar {
            animation: fadeOutSplash 0.4s ease-in-out 1.5s forwards;
        }

        #splash-screen img {
            width: 180px;
            height: auto;
        }

        .logo-animar {
            animation: pulseLogo 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes pulseLogo {
            0% { transform: scale(0.8); opacity: 0; filter: drop-shadow(0 0 0px var(--primary-color)); }
            50% { filter: drop-shadow(0 0 30px var(--primary-color)); }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 0px var(--primary-color)); }
        }

        @keyframes fadeOutSplash {
            100% { opacity: 0; visibility: hidden; pointer-events: none; z-index: -1; }
        }

        /* --- CABECERA PRINCIPAL --- */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            background-color: transparent;
            border-bottom: 2px solid var(--border-color);
        }
        .header h1 { color: var(--text-color); font-weight: 800; font-size: 2.8rem; letter-spacing: -1px; margin-bottom: 0; text-transform: uppercase; }
        .header h1 span { color: var(--primary-color); }
        .header p { color: #555; font-size: 0.95rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; margin-top: -5px;}

        /* --- CUADRÍCULA DE HERRAMIENTAS --- */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 12px;
            padding: 20px 15px;
        }
        
        @keyframes fluidEntrance {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card {
            background-color: rgba(255, 255, 255, 0.85); 
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 10px; 
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px; 
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            opacity: 0; /* Oculto inicialmente para la animación */
        }

        /* Clases para animación controlada por JS */
        .card-animar { animation: fluidEntrance 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .card-visible { opacity: 1; }

        .card-animar:nth-child(1) { animation-delay: 1.5s; } 
        .card-animar:nth-child(2) { animation-delay: 1.55s; }
        .card-animar:nth-child(3) { animation-delay: 1.6s; }
        .card-animar:nth-child(4) { animation-delay: 1.65s; }
        .card-animar:nth-child(5) { animation-delay: 1.7s; }
        .card-animar:nth-child(6) { animation-delay: 1.75s; }

        .card:active {
            transform: scale(0.96);
            border-color: var(--primary-color);
            background-color: #fff;
        }
        
        .card::after {
            content: ""; position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: radial-gradient(circle, var(--primary-metallic-light) 0%, rgba(255,102,0,0) 70%);
            border-radius: 50%; opacity: 0; transform: translate(-50%, -50%); transition: none; z-index: -1; 
        }
        .card:active::after { animation: metallicPulse 0.4s ease-out; opacity: 1; }

        @keyframes metallicPulse {
            0% { width: 10px; height: 10px; opacity: 0.9; }
            100% { width: 400px; height: 400px; opacity: 0; }
        }

        /* ÍCONOS NARANJAS POR DEFECTO */
        .icon-container { 
            height: 70px; display: flex; align-items: center; justify-content: center; 
            margin-bottom: 12px; width: 100%; 
            color: var(--primary-color); 
            transition: color 0.2s, transform 0.2s;
        }
        
        /* Al tocar, el ícono se vuelve negro para dar contraste visual de presión */
        .card:active .icon-container { color: #111; transform: scale(1.1); }

        .card span {
            font-size: 0.9rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2;
            color: #000; z-index: 1; transition: color 0.2s;
        }
        .card:active span { color: var(--primary-color); }

        .version-tag { text-align: center; color: #555; font-size: 0.85rem; font-weight: 800; font-family: monospace; display: block; margin: 10px 0 20px; }
   /* --- AJUSTE COMPACTO PARA PANTALLAS MÓVILES PEQUEÑAS --- */
        @media screen and (max-width: 480px) {
            html { font-size: 13px; } /* Reduce todos los textos un 18% automáticamente */
            .btn-accion { padding: 10px; font-size: 0.95rem; }
            input, select { padding: 8px; font-size: 1rem; }
            .panel-control { padding: 10px; margin-bottom: 10px;}
            .top-bar { padding: 8px 15px; height: 60px; }
            .btn-volver-mini { width: 35px; height: 35px; font-size: 1.5rem;}
            .header h1 { font-size: 2.2rem; }
            .grid-container { gap: 10px; padding: 10px; }
            .card { min-height: 120px; padding: 10px; }
            .icon-container { height: 45px; margin-bottom: 5px; }
            .icon-container svg { width: 35px; height: 35px; }
            .btn-calculadora-flotante, .btn-flotante { width: 50px; height: 50px; bottom: 15px; right: 15px;}
            .calculadora-modal { right: 15px; bottom: 75px; width: 240px; padding: 10px;}
            #calcDisplay { height: 40px; font-size: 1.4rem; padding: 5px;}
            .calc-grid button { padding: 8px 0; font-size: 1.1rem; }
        }
   </style>
    <link rel="manifest" href="manifest.json">
    <script>
        // --- SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js');
            });
        }

        // --- LÓGICA DE SPLASH SCREEN INTELIGENTE ---
        document.addEventListener("DOMContentLoaded", function() {
            const splash = document.getElementById('splash-screen');
            const logo = splash.querySelector('img');
            const cards = document.querySelectorAll('.card');

            // Revisamos si es la primera vez que se carga en esta sesión
            if (!sessionStorage.getItem('splashMostrado')) {
                // Es la primera vez -> Mostrar animaciones
                splash.classList.add('splash-animar');
                logo.classList.add('logo-animar');
                cards.forEach(card => card.classList.add('card-animar'));
                
                // Guardamos en memoria que ya se mostró
                sessionStorage.setItem('splashMostrado', 'true');
            } else {
                // Ya se mostró antes -> Ocultar splash inmediatamente
                splash.style.display = 'none';
                // Mostrar tarjetas inmediatamente sin el delay de 1.5s
                cards.forEach(card => card.classList.add('card-visible'));
            }
        });
    </script>
