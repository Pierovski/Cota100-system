<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COTA100 SYSTEM - Raw Tech Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --primary-color: #FF6600; 
            --primary-metallic-light: #FF8833; 
            --border-color: rgba(0, 0, 0, 0.2); 
            --nav-bg: rgba(255, 255, 255, 0.90);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding-bottom: 100px;
            /* MAPA TOPOGRÁFICO REALISTA: Curvas maestras gruesas y ordinarias delgadas */
            background-image: url("data:image/svg+xml,%3Csvg width='600' height='600' viewBox='0 0 800 800' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23000000' stroke-opacity='0.15'%3E%3Cpath stroke-width='2.5' d='M0 150c100-20 150 50 250 40s150-80 300-60 200 100 250 80v-210H0z'/%3E%3Cpath stroke-width='2.5' d='M0 450c150 50 250-50 400 0s200 150 400 100'/%3E%3Cpath stroke-width='2.5' d='M250 250c30-40 80-20 100 20s-20 80-60 60-60-50-40-80z'/%3E%3Cpath stroke-width='0.8' d='M0 200c110-15 160 55 260 45s160-85 310-65 210 105 230 85'/%3E%3Cpath stroke-width='0.8' d='M0 250c120-10 170 60 270 50s170-90 320-70 220 110 210 90'/%3E%3Cpath stroke-width='0.8' d='M0 300c130-5 180 65 280 55s180-95 330-75 230 115 190 95'/%3E%3Cpath stroke-width='0.8' d='M0 350c140 0 190 70 290 60s190-100 340-80 240 120 170 100'/%3E%3Cpath stroke-width='0.8' d='M0 400c145 25 220 10 345 30s195-50 370 10'/%3E%3Cpath stroke-width='0.8' d='M230 230c40-50 100-30 120 20s-20 100-80 80-70-60-40-100z'/%3E%3Cpath stroke-width='0.8' d='M210 210c50-60 120-40 140 20s-20 120-100 100-80-70-40-120z'/%3E%3Cpath stroke-width='0.8' d='M190 190c60-70 140-50 160 20s-20 140-120 120-90-80-40-140z'/%3E%3Cpath stroke-width='0.8' d='M600 300c40-20 80 0 90 40s-30 60-70 40-40-50-20-80z'/%3E%3Cpath stroke-width='0.8' d='M580 280c50-30 100-10 110 40s-40 80-90 60-50-60-20-100z'/%3E%3Cpath stroke-width='2.5' d='M560 260c60-40 120-20 130 40s-50 100-110 80-60-70-20-120z'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 600px 600px;
            background-position: center;
            overflow-x: hidden;
            position: relative;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
            background-color: transparent;
            border-bottom: 2px solid var(--border-color);
        }

        .header h1 {
            color: var(--text-color);
            font-weight: 700;
            font-size: 3.2rem;
            letter-spacing: -1px;
            margin-bottom: 0px;
            text-transform: uppercase;
        }

        .header h1 span { color: var(--primary-color); }

        .header p {
            color: #111; 
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 12px;
            padding: 20px 15px;
        }
        
        .full-width-card { grid-column: 1 / -1; }

        @keyframes fluidEntrance {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Diseño de Tarjetas: CAJETÍN TRANSPARENTE */
        .card {
            background-color: transparent; 
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 15px 5px; 
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 195px; /* Caja MASIVA para acomodar los nuevos íconos */
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fluidEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.10s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.20s; }
        .card:nth-child(5) { animation-delay: 0.25s; }

        .card:active {
            transform: scale(0.96);
            border-color: var(--primary-color);
            background-color: rgba(255, 255, 255, 0.8);
        }
        
        /* Luz Naranja Metálica Emanando */
        .card::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%; width: 10px; height: 10px;
            background: radial-gradient(circle, var(--primary-metallic-light) 0%, rgba(255,102,0,0) 70%);
            border-radius: 50%;
            opacity: 0;
            transform: translate(-50%, -50%);
            transition: none;
            z-index: -1; 
        }
        
        .card:active::after {
            animation: metallicPulse 0.4s ease-out;
            opacity: 1;
        }

        @keyframes metallicPulse {
            0% { width: 10px; height: 10px; opacity: 0.9; }
            100% { width: 400px; height: 400px; opacity: 0; }
        }

        .icon-container {
            height: 125px; /* Contenedor gigantesco */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            width: 100%;
        }

        /* ÍCONOS EMOJI TITÁNICOS */
        .icon-emoji { 
            font-size: 7rem; /* Tamaño brutal para igualar al SVG */
            line-height: 1;
            display: block;
        }

        .icon-svg {
            position: relative;
            z-index: 1;
        }

        .card span {
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
            color: #000;
            z-index: 1;
            transition: color 0.2s;
            /* Sombra blanca gruesa para proteger el texto */
            text-shadow: -1px -1px 3px #fff, 1px -1px 3px #fff, -1px 1px 3px #fff, 1px 1px 3px #fff, 0 0 8px #fff;
        }
        
        .card:active span { color: var(--primary-color); text-shadow: none;}

        /* Menú Navegación Inferior */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border-color);
            z-index: 1000;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        .nav-item {
            color: #666;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active { color: var(--primary-color); }
        .nav-icon { font-size: 1.7rem; margin-bottom: 2px; font-style: normal; transition: transform 0.2s; }
        .nav-item:active .nav-icon { transform: scale(1.1) translateY(-2px); }
        
        .version-tag {
            text-align: center;
            color: #777;
            font-size: 0.8rem;
            font-weight: bold;
            font-family: monospace;
            display: block;
            margin: 15px 0;
        }
    </style>

</head>
