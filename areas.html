<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COTA100 SYSTEM - Áreas</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #000000;
            --primary-color: #FF6600; --input-bg: rgba(255,255,255,0.9);
            --table-border: rgba(0,0,0,0.3); --error-color: #d32f2f;
            --table-header: #111;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent;}
        body { 
            background-color: var(--bg-color); color: var(--text-color); padding: 15px; padding-bottom: 50px; 
            /* MAPA SVG: Polígonos y Áreas */
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23000000' stroke-opacity='0.1' stroke-width='1.5' fill='none'%3E%3Cpolygon points='50,50 350,100 300,350 100,300'/%3E%3Cpolygon points='100,100 250,150 200,250'/%3E%3Cline x1='50' y1='50' x2='350' y2='100' stroke-dasharray='5,5'/%3E%3Cline x1='100' y1='300' x2='300' y2='350' stroke-dasharray='5,5'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%23000' fill-opacity='0.1'/%3E%3Ccircle cx='350' cy='100' r='4' fill='%23000' fill-opacity='0.1'/%3E%3Ccircle cx='300' cy='350' r='4' fill='%23000' fill-opacity='0.1'/%3E%3Ccircle cx='100' cy='300' r='4' fill='%23000' fill-opacity='0.1'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 400px 400px; background-attachment: fixed;
        }

        .top-bar { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--table-border); padding-bottom: 10px; background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); position: sticky; top:0; z-index:100; margin: -15px -15px 15px -15px; padding: 15px;}
        .btn-volver-mini { background: transparent; border: none; color: var(--text-color); font-size: 2rem; font-weight: 800; cursor: pointer; padding-right: 15px; line-height: 1;}
        .top-bar-title { color: var(--text-color); font-weight: 800; font-size: 1.4rem; text-transform: uppercase; margin: 0; }
        .top-bar-title span { color: var(--primary-color); }

        .seccion-modulo { border: 2px solid var(--table-border); border-radius: 12px; padding: 15px; margin-bottom: 15px; background-color: rgba(255,255,255,0.85); backdrop-filter: blur(5px);}
        .seccion-titulo { color: var(--primary-color); font-size: 1.1rem; font-weight: 800; margin-bottom: 10px; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 5px; text-transform: uppercase;}
        .helper-text { font-size: 0.8rem; color: #555; margin-bottom: 15px; line-height: 1.3; font-weight: 600;}

        .table-container { width: 100%; overflow-x: auto; margin-bottom: 15px; border-radius: 8px; border: 2px solid var(--table-border); }
        table { width: 100%; min-width: 400px; border-collapse: collapse; background-color: rgba(255,255,255,0.9); }
        th, td { border: 1px solid var(--table-border); padding: 5px; text-align: center; }
        th { background-color: var(--table-header); color: #fff; font-weight: 800; text-transform: uppercase; padding: 10px 5px; font-size: 0.9rem;}
        td input { border: none; background: transparent; width: 100%; height: 100%; padding: 12px 5px; font-weight: 700; color: #000; text-align: center; font-size: 1.1rem; border-radius: 0;}
        td input:focus { background-color: #fff3e0; outline: 2px solid var(--primary-color); outline-offset: -2px; z-index:2; position:relative;}

        .btn-accion { width: 100%; padding: 15px; font-size: 1.1rem; background-color: var(--table-header); color: #fff; border: none; border-radius: 8px; font-weight: 800; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s;}
        .btn-accion:active { background-color: var(--primary-color); transform: scale(0.98);}
        .btn-calc { background-color: var(--primary-color); color: #fff; font-size: 1.3rem; margin-top: 5px; box-shadow: 0 4px 10px rgba(255,102,0,0.3);}

        .result-box { margin-top: 20px; padding: 15px; border: 3px solid #111; border-radius: 12px; background-color: #fff; display: none; text-align: center; }
        .res-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        .res-item { background-color: rgba(0,0,0,0.03); padding: 15px; border-radius: 8px; border: 1px solid var(--table-border);}
        .res-titulo { color: #555; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px; font-weight: 800;}
        .res-valor { font-size: 2rem; color: var(--primary-color); font-weight: 800; font-family: monospace;}
        .res-hectareas { font-size: 1.3rem; color: #2e7d32; margin-top: 5px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-volver-mini" onclick="window.location.href='index.html'">←</button>
        <h2 class="top-bar-title">ÁREAS Y <span>PERÍMETROS</span></h2>
    </div>

    <div class="seccion-modulo" style="padding: 10px 5px;">
        <div class="seccion-titulo" style="padding-left: 10px;">VÉRTICES DEL POLÍGONO</div>
        <div class="helper-text" style="padding-left: 10px; padding-right: 10px;">* Ingresa las coordenadas en orden perimetral (horario o antihorario). El sistema cerrará la figura automáticamente.</div>
        
        <div class="table-container">
            <table id="tablaAreas">
                <thead>
                    <tr>
                        <th style="width: 20%;">PT.</th>
                        <th style="width: 40%;">ESTE (X)</th>
                        <th style="width: 40%;">NORTE (Y)</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaAreas">
                    <tr>
                        <td style="color:var(--primary-color); font-weight:800; font-size:1.2rem;">1</td>
                        <td><input type="number" class="coor-x" step="0.001" placeholder="Ej: 715000"></td>
                        <td><input type="number" class="coor-y" step="0.001" placeholder="Ej: 9105000"></td>
                    </tr>
                    <tr>
                        <td style="color:var(--primary-color); font-weight:800; font-size:1.2rem;">2</td>
                        <td><input type="number" class="coor-x" step="0.001" placeholder="..."></td>
                        <td><input type="number" class="coor-y" step="0.001" placeholder="..."></td>
                    </tr>
                    <tr>
                        <td style="color:var(--primary-color); font-weight:800; font-size:1.2rem;">3</td>
                        <td><input type="number" class="coor-x" step="0.001" placeholder="..."></td>
                        <td><input type="number" class="coor-y" step="0.001" placeholder="..."></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="display: flex; gap: 10px; padding: 0 5px;">
            <button class="btn-accion" style="background:#fff; border: 2px solid #000; color:#000;" onclick="agregarPunto()">+ Punto</button>
            <button class="btn-accion" style="background:#fff; border: 2px solid var(--error-color); color:var(--error-color);" onclick="quitarPunto()">- Punto</button>
        </div>
    </div>

    <button class="btn-accion btn-calc" onclick="calcularArea()">Calcular Área</button>

    <div class="result-box" id="cajaResultado">
        <div class="res-grid">
            <div class="res-item" style="border: 2px solid var(--primary-color);">
                <div class="res-titulo" style="color: var(--primary-color);">ÁREA TOTAL DEL LOTE</div>
                <div class="res-valor" id="resAreaM2">0.00 m²</div>
                <div class="res-hectareas" id="resAreaHa">0.0000 Ha</div>
            </div>
            <div class="res-item">
                <div class="res-titulo">PERÍMETRO TOTAL</div>
                <div class="res-valor" id="resPerimetro" style="color: #111;">0.000 m</div>
            </div>
        </div>
    </div>

    <script>
        function agregarPunto() {
            const tbody = document.getElementById('cuerpoTablaAreas');
            const num = tbody.children.length + 1;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:var(--primary-color); font-weight:800; font-size:1.2rem;">${num}</td>
                <td><input type="number" class="coor-x" step="0.001" placeholder="..."></td>
                <td><input type="number" class="coor-y" step="0.001" placeholder="..."></td>
            `;
            tbody.appendChild(tr);
        }

        function quitarPunto() {
            const tbody = document.getElementById('cuerpoTablaAreas');
            if (tbody.children.length > 3) {
                tbody.removeChild(tbody.lastChild);
            } else {
                alert("Un polígono debe tener al menos 3 puntos para generar un área.");
            }
        }

        function calcularArea() {
            let filas = document.querySelectorAll('#cuerpoTablaAreas tr');
            let X = [];
            let Y = [];

            for (let i = 0; i < filas.length; i++) {
                let xVal = parseFloat(filas[i].querySelector('.coor-x').value);
                let yVal = parseFloat(filas[i].querySelector('.coor-y').value);
                
                if (isNaN(xVal) || isNaN(yVal)) {
                    alert(`Falta completar coordenadas en el Punto ${i+1}`);
                    return;
                }
                X.push(xVal);
                Y.push(yVal);
            }

            let area = 0;
            let perimetro = 0;
            let j = X.length - 1; 

            for (let i = 0; i < X.length; i++) {
                area += (X[j] + X[i]) * (Y[j] - Y[i]);
                let dX = X[i] - X[j];
                let dY = Y[i] - Y[j];
                perimetro += Math.sqrt(dX*dX + dY*dY);
                j = i; 
            }

            area = Math.abs(area / 2.0);
            let hectareas = area / 10000.0;

            document.getElementById('resAreaM2').innerText = area.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " m²";
            document.getElementById('resAreaHa').innerText = hectareas.toLocaleString('en-US', {minimumFractionDigits: 4, maximumFractionDigits: 4}) + " Ha";
            document.getElementById('resPerimetro').innerText = perimetro.toLocaleString('en-US', {minimumFractionDigits: 3, maximumFractionDigits: 3}) + " m";

            document.getElementById('cajaResultado').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
