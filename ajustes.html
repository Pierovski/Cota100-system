<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COTA100 SYSTEM - Ajustes</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #000000;
            --primary-color: #FF6600; --border-color: rgba(0, 0, 0, 0.2); 
            --panel-bg: rgba(255,255,255,0.85); --input-bg: rgba(255,255,255,0.9);
            --table-header: #111; --danger-color: #d32f2f;
        }

        /* --- CONFIGURACIÓN MODO OSCURO --- */
        body.dark-mode {
            --bg-color: #0e0e0e; --text-color: #e0e0e0;
            --border-color: rgba(255, 255, 255, 0.1); 
            --panel-bg: rgba(30,30,30,0.9); --input-bg: rgba(45,45,45,0.9);
            --table-header: #000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px;
            transition: background-color 0.3s, color 0.3s;
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23888888' stroke-opacity='0.05' fill='none'%3E%3Ccircle cx='200' cy='200' r='100' stroke-width='2'/%3E%3Ccircle cx='200' cy='200' r='150' stroke-width='2' stroke-dasharray='10,10'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 400px 400px; background-attachment: fixed;
        }

        .top-bar { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; border-bottom: 2px solid var(--border-color);
            background-color: var(--panel-bg); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        
        .btn-volver-mini { 
            background: rgba(128,128,128,0.1); border: 2px solid var(--border-color); color: var(--text-color); 
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; transition: 0.2s;
        }

        .top-bar-title { color: var(--text-color); font-weight: 800; font-size: 1.4rem; text-transform: uppercase; margin: 0; text-align: center;}
        .top-bar-title span { color: var(--primary-color); display: block; font-size: 0.85rem;}

        .modulo-container { padding: 15px; animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .panel-control { 
            border: 2px solid var(--border-color); border-radius: 12px; padding: 20px 15px; 
            margin-bottom: 20px; background: var(--panel-bg); backdrop-filter: blur(8px);
        }
        .panel-titulo { 
            color: var(--primary-color); font-weight: 800; font-size: 1.2rem; text-transform: uppercase; 
            margin-bottom: 15px; border-bottom: 2px solid rgba(128,128,128,0.2); padding-bottom: 5px; 
            display: flex; align-items: center; gap: 8px; justify-content: space-between;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }
        
        label { font-weight: 800; color: var(--text-color); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8;}
        input, select { 
            width: 100%; padding: 12px; font-size: 1.1rem; font-weight: 700; 
            background: var(--input-bg); border: 2px solid var(--border-color); border-radius: 6px; 
            color: var(--text-color); transition: 0.2s; font-family: 'Rajdhani', sans-serif;
        }
        
        /* INTERRUPTOR (SWITCH) */
        .switch-container { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .switch-container:last-child { border-bottom: none; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-accion { 
            width: 100%; padding: 15px; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; 
            background: var(--table-header); color: #fff; border: none; border-radius: 8px; cursor: pointer; 
            transition: 0.2s; margin-top: 10px;
        }
        .btn-guardar { background: var(--primary-color); font-size: 1.3rem;}
        .btn-limpiar { background: transparent; color: var(--danger-color); border: 2px solid var(--danger-color); margin-top: 5px;}

        .notificacion {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #111; color: #fff; padding: 12px 25px; border-radius: 30px; font-weight: 800;
            opacity: 0; transition: 0.3s; z-index: 1000; border: 2px solid var(--primary-color);
        }
        .notificacion.mostrar { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media screen and (max-width: 480px) {
            html { font-size: 13px; }
            .panel-control { padding: 15px 12px; }
        }
    </style>
</head>
<body onload="cargarAjustes()">

    <div class="top-bar">
        <a href="index.html" class="btn-volver-mini">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h2 class="top-bar-title">AJUSTES <span>Sistema Cota100</span></h2>
        <div style="width: 45px;"></div>
    </div>

    <div class="modulo-container">

        <div class="panel-control" style="border-left: 5px solid var(--primary-color);">
            <div class="panel-titulo">1. Registros Personales</div>
            <div class="form-grid">
                <div class="input-group full-width">
                    <label>Proyecto Activo</label>
                    <input type="text" id="ajusteProyecto" placeholder="EJ: CARRETERA VALLE SOL" oninput="this.value = this.value.toUpperCase()">
                </div>
                <div class="input-group">
                    <label>Topógrafo</label>
                    <input type="text" id="ajusteOperador" placeholder="EJ: PIERO C." oninput="this.value = this.value.toUpperCase()">
                </div>
                <div class="input-group">
                    <label>Equipo</label>
                    <input type="text" id="ajusteEquipo" placeholder="EJ: NIVEL LEICA" oninput="this.value = this.value.toUpperCase()">
                </div>
            </div>
        </div>

        <div class="panel-control" style="border-left: 5px solid #6200ea;">
            <div class="panel-titulo" style="color: #6200ea;">2. Interfaz y Energía</div>
            
            <div class="switch-container">
                <div>
                    <label style="display:block; margin:0;">Modo Oscuro</label>
                    <span style="font-size:0.7rem; font-weight:600; opacity:0.7;">Ahorra batería en pantallas AMOLED.</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="checkDarkMode" onchange="toggleDarkMode()">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switch-container">
                <div>
                    <label style="display:block; margin:0;">Mantener Pantalla Activa</label>
                    <span style="font-size:0.7rem; font-weight:600; opacity:0.7;">Evita que el celular se apague en campo.</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="checkWakeLock" onchange="toggleWakeLock()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="panel-control" style="border-left: 5px solid #2e7d32;">
            <div class="panel-titulo" style="color: #2e7d32;">3. Topografía General</div>
            <div class="form-grid">
                <div class="input-group">
                    <label>Precisión</label>
                    <select id="ajusteDecimales">
                        <option value="3">3 Decimales</option>
                        <option value="4">4 Decimales</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Límite Mira</label>
                    <select id="ajusteAlertaMira">
                        <option value="5">5.0m</option>
                        <option value="4">4.0m</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="panel-control" style="border-left: 5px solid #000; background: rgba(128,128,128,0.05);">
            <div class="panel-titulo" style="color: #000;">Copia de Seguridad</div>
            <button class="btn-accion" style="background:#111;" onclick="exportarBackupTotal()">📤 Exportar Todo (.json)</button>
            <div style="margin-top: 15px;">
                <label style="font-size: 0.75rem;">Restaurar desde archivo:</label>
                <input type="file" id="importFile" accept=".json" style="font-size: 0.8rem; border:none; background:transparent;">
                <button class="btn-accion" style="background:#fff; color:#111; border:2px solid #111;" onclick="importarBackupTotal()">📥 Importar Backup</button>
            </div>
        </div>

        <button class="btn-accion btn-guardar" onclick="guardarAjustes()">💾 GUARDAR TODO</button>

        <div class="panel-control" style="margin-top: 30px; border: 2px dashed var(--danger-color);">
            <div class="panel-titulo" style="color: var(--danger-color); justify-content:space-between;">
                Mantenimiento
                <span id="conexionStatus" style="font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; border: 1px solid;">ONLINE</span>
            </div>
            <button class="btn-accion btn-limpiar" onclick="forzarActualizacionPWA()">🔄 LIMPIAR CACHÉ</button>
        </div>

    </div>

    <div id="toastMsg" class="notificacion">✓ Acción Exitosa</div>

    <script>
        let wakeLock = null;

        function cargarAjustes() {
            verificarConexion();
            let conf = JSON.parse(localStorage.getItem('cota100_ajustes')) || {};
            
            // Cargar datos
            document.getElementById('ajusteProyecto').value = conf.proyecto || "";
            document.getElementById('ajusteOperador').value = conf.operador || "";
            document.getElementById('ajusteEquipo').value = conf.equipo || "";
            document.getElementById('ajusteDecimales').value = conf.decimales || "3";
            document.getElementById('ajusteAlertaMira').value = conf.alertaMira || "5";

            // Cargar Modo Oscuro
            if(conf.darkMode) {
                document.getElementById('checkDarkMode').checked = true;
                document.body.classList.add('dark-mode');
            }

            // Cargar Wake Lock
            if(conf.wakeLockEnabled) {
                document.getElementById('checkWakeLock').checked = true;
                solicitarWakeLock();
            }
        }

        function toggleDarkMode() {
            const isDark = document.getElementById('checkDarkMode').checked;
            if(isDark) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
            guardarAjustes();
        }

        async function toggleWakeLock() {
            const isEnabled = document.getElementById('checkWakeLock').checked;
            if(isEnabled) await solicitarWakeLock();
            else liberarWakeLock();
            guardarAjustes();
        }

        async function solicitarWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log("Pantalla bloqueada (Activa)");
                } catch (err) { console.error(`${err.name}, ${err.message}`); }
            }
        }

        function liberarWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        function guardarAjustes() {
            let conf = {
                proyecto: document.getElementById('ajusteProyecto').value,
                operador: document.getElementById('ajusteOperador').value,
                equipo: document.getElementById('ajusteEquipo').value,
                decimales: document.getElementById('ajusteDecimales').value,
                alertaMira: document.getElementById('ajusteAlertaMira').value,
                darkMode: document.getElementById('checkDarkMode').checked,
                wakeLockEnabled: document.getElementById('checkWakeLock').checked
            };
            localStorage.setItem('cota100_ajustes', JSON.stringify(conf));
            mostrarToast("Ajustes Guardados");
        }

        function verificarConexion() {
            const status = document.getElementById('conexionStatus');
            if (navigator.onLine) { status.textContent = "ONLINE"; status.style.color = "#2e7d32"; }
            else { status.textContent = "OFFLINE"; status.style.color = "#d32f2f"; }
        }

        function mostrarToast(msg) {
            let toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.classList.add('mostrar');
            setTimeout(() => { toast.classList.remove('mostrar'); }, 2000);
        }

        // --- BACKUP ---
        function exportarBackupTotal() {
            const backup = {
                db_simple: JSON.parse(localStorage.getItem('cota100_db_simple_v3')),
                ajustes: JSON.parse(localStorage.getItem('cota100_ajustes'))
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `COTA100_FULL_BACKUP.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importarBackupTotal() {
            const fileInput = document.getElementById('importFile');
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const backup = JSON.parse(e.target.result);
                    if(backup.db_simple) localStorage.setItem('cota100_db_simple_v3', JSON.stringify(backup.db_simple));
                    if(backup.ajustes) localStorage.setItem('cota100_ajustes', JSON.stringify(backup.ajustes));
                    alert("Importación exitosa. Recargando...");
                    window.location.reload();
                } catch(err) { alert("Error en el archivo."); }
            };
            reader.readAsText(fileInput.files[0]);
        }

        function forzarActualizacionPWA() {
            if (!navigator.onLine) return alert("Sin internet.");
            if(confirm("¿Forzar actualización?")) {
                caches.keys().then(names => { for (let name of names) caches.delete(name); });
                navigator.serviceWorker.getRegistrations().then(regs => { for(let reg of regs) reg.unregister(); })
                .then(() => { window.location.reload(true); });
            }
        }
    </script>
</body>
</html>
