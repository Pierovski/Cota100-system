<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COTA100 SYSTEM - Nivelación Alcantarillado</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg-color: #ffffff; --text-color: #000000;
            --primary-color: #FF6600; --border-color: rgba(0, 0, 0, 0.2); 
            --table-header: #111; --danger-color: #d32f2f; --excel-color: #1b5e20;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-color); color: var(--text-color); padding-bottom: 80px;
            background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23000000' stroke-opacity='0.05' fill='none'%3E%3Cline x1='0' y1='150' x2='400' y2='250' stroke-width='10'/%3E%3Cline x1='0' y1='190' x2='400' y2='290' stroke-width='2' stroke-dasharray='10,10'/%3E%3Ccircle cx='100' cy='175' r='30' stroke-width='3'/%3E%3Ccircle cx='300' cy='225' r='30' stroke-width='3'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 400px 400px; background-attachment: fixed;
        }

        /* --- CABECERA SUPERIOR --- */
        .top-bar { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 2px solid var(--border-color);
            background-color: rgba(255, 255, 255, 0.95); 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
            height: 75px; 
        }
        
        .btn-volver-mini { 
            background: rgba(0,0,0,0.03); border: 2px solid var(--border-color); color: var(--text-color); 
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-volver-mini:active { background: var(--text-color); color: var(--bg-color); transform: translateX(-5px) scale(0.95); border-color: var(--text-color);}

        .top-bar-title { color: var(--text-color); font-weight: 800; font-size: 1.3rem; text-transform: uppercase; margin: 0; text-align: center; line-height: 1.1;}
        .top-bar-title span { color: var(--primary-color); display: block; font-size: 0.9rem;}

        .modulo-container { padding: 15px; animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PANELES DE CONTROL --- */
        .panel-control { 
            border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; 
            margin-bottom: 15px; background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
        }
        .panel-titulo { 
            color: var(--primary-color); font-weight: 800; font-size: 1.1rem; text-transform: uppercase; 
            margin-bottom: 15px; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 5px; 
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-toggle-panel { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-color); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }

        label { font-weight: 800; color: #111; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 3px; }
        input, select { 
            width: 100%; padding: 12px; font-size: 1.15rem; font-weight: 800; text-align: center;
            background: rgba(255,255,255,0.9); border: 2px solid var(--border-color); border-radius: 8px; 
            color: #000; transition: 0.2s; font-family: 'Rajdhani', sans-serif;
        }
        input:focus, select:focus { border-color: var(--primary-color); outline: none; background: #fff;}

        /* --- GESTIÓN DE BMs (PREMIUM) --- */
        .bm-list { margin-top: 10px; max-height: 150px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .bm-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #eee; }
        .bm-item:last-child { border-bottom: none; }
        .bm-item:active { background: #fdf2e9; }
        .bm-info { display: flex; flex-direction: column; text-align: left; }
        .bm-info strong { font-size: 1rem; color: #111; }
        .bm-info span { font-size: 0.85rem; color: var(--primary-color); font-weight: 700; }
        .btn-delete-bm { background: none; border: none; color: #ccc; font-size: 1rem; padding: 5px; }

        .btn-select-bm {
            background: #f4f4f4; border: 2px solid var(--border-color); padding: 8px; border-radius: 8px;
            font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-top: 5px;
        }

        /* --- BOTONES --- */
        .btn-accion { width: 100%; padding: 15px; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; background: var(--table-header); color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-accion:active { background: var(--primary-color); transform: scale(0.98);}
        .btn-auto { background: #fff; color: #111; border: 2px dashed #111; margin-bottom: 15px; font-size: 0.95rem; padding: 12px;}
        .btn-auto:active { background: #111; color: var(--primary-color); border-style: solid;}
        .btn-excel { background: #fff; color: var(--excel-color); border: 2px solid var(--excel-color); margin-top: 15px; display: none;}
        .btn-excel:active { background: var(--excel-color); color: #fff; }

        /* --- TABLA RAW TECH --- */
        .seccion-tabla { display: none; margin-top: 15px; }
        .table-wrapper { width: 100%; max-height: 55vh; overflow: auto; border: 3px solid var(--table-header); border-radius: 8px; background: #fff; }
        table { width: 100%; min-width: 700px; border-collapse: separate; border-spacing: 0; }
        th { background: var(--table-header); color: #fff; font-weight: 800; padding: 12px 5px; font-size: 0.85rem; text-transform: uppercase; position: sticky; top: 0; z-index: 10; }
        td { border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); padding: 12px 5px; text-align: center; font-weight: 700; }
        
        .res-ai { text-align: center; font-size: 1.2rem; font-weight: 800; color: #111; margin: 15px 0; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; border: 1px dashed #111;}
        .res-ai span { color: var(--primary-color); font-family: monospace; font-size: 1.5rem;}

        /* --- CALCULADORA --- */
        .btn-calculadora-flotante { position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px; background: #fff; color: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid var(--primary-color); cursor: pointer; z-index: 999; }
        .calculadora-modal { position: fixed; bottom: 160px; right: 20px; width: 260px; background: rgba(255, 255, 255, 0.95); border: 2px solid var(--table-header); border-radius: 12px; padding: 15px; display: none; z-index: 1000; backdrop-filter: blur(10px); }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .calc-grid button { padding: 10px 0; font-size: 1.3rem; font-weight: 800; border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; background: #fff; cursor: pointer; }
        #calcDisplay { width: 100%; height: 45px; text-align: right; font-size: 1.6rem; font-weight: 800; border: 2px solid rgba(0,0,0,0.1); margin-bottom: 10px; padding: 5px; background: #f5f5f5; }

        @media screen and (max-width: 480px) {
            html { font-size: 13px; }
            .btn-accion { padding: 10px; font-size: 0.95rem; }
            input, select { padding: 10px; font-size: 1rem; }
        }
    </style>
</head>
<body onload="cargarProyectoLocal()">

    <div class="top-bar">
        <a href="nivelacion.html" class="btn-volver-mini">←</a>
        <h2 class="top-bar-title">ALCANTARILLADO <span>Control de Redes</span></h2>
        <div style="width: 45px;"></div> 
    </div>

    <div class="modulo-container">

        <!-- SECCIÓN 0: GESTIÓN DE PROYECTO (NUEVO) -->
        <div class="panel-control" style="border-left: 5px solid #111;">
            <div class="panel-titulo">
                📁 Gestión de Proyecto
                <button class="btn-toggle-panel" onclick="togglePanel('panelProyectoContenido')">▼</button>
            </div>
            <div id="panelProyectoContenido">
                <div class="input-group full-width">
                    <label>Nombre de la Obra</label>
                    <input type="text" id="proyectName" placeholder="Ej: Red de Agua Sector 4" oninput="saveProyecto()">
                </div>
                <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
                    <label style="color: var(--primary-color);">+ Registrar Punto de Control (BM)</label>
                    <div class="form-grid" style="margin-top: 5px;">
                        <input type="text" id="newBMName" placeholder="Nombre (Ej: BM-01)">
                        <input type="number" id="newBMCota" step="0.001" placeholder="Cota (m)">
                    </div>
                    <button class="btn-accion" style="padding: 10px; font-size: 0.9rem;" onclick="addBM()">Guardar BM en Banco</button>
                </div>
                <div class="bm-list" id="listaBMs">
                    <!-- Se llena dinámicamente -->
                </div>
            </div>
        </div>

        <!-- SECCIÓN 1: PARÁMETROS DE DISEÑO (ORIGINAL) -->
        <div class="panel-control panel-ocultable" style="border-left: 5px solid #111;">
            <div class="panel-titulo">1. Parámetros de Diseño</div>
            <button class="btn-accion btn-auto" onclick="autocalcularTramo()">🪄 Deducir Dato Faltante (Auto-Cálculo)</button>

            <div class="form-grid">
                <div class="input-group"><label>Cota Fondo Inicial</label><input type="number" id="cotaIni" step="0.001" placeholder="Ej: 2850.100" oninput="evaluarLimiteVA()"></div>
                <div class="input-group"><label>Cota Fondo Final</label><input type="number" id="cotaFin" step="0.001" placeholder="Ej: 2848.500" oninput="evaluarLimiteVA()"></div>
                <div class="input-group"><label>Distancia Total (m)</label><input type="number" id="distTotal" step="0.001" placeholder="Ej: 80.000"></div>
                <div class="input-group"><label>Pendiente (% al 100)</label><input type="number" id="pte" step="0.001" placeholder="Ej: -2.000"></div>
            </div>
        </div>

        <!-- SECCIÓN 2: ESTACIÓN Y TUBERÍA (ORIGINAL ACTUALIZADA) -->
        <div class="panel-control panel-ocultable" style="border-left: 5px solid var(--primary-color);">
            <div class="panel-titulo">2. Estación y Tubería (Campo)</div>
            <div class="form-grid">
                <div class="input-group full-width">
                    <label>BM de Referencia</label>
                    <select id="selectBMProyecto" onchange="seleccionarBM(this.value)">
                        <option value="">-- Seleccionar de Proyecto --</option>
                    </select>
                    <input type="number" id="cotaBM" step="0.001" placeholder="Cota BM" style="margin-top: 8px;" oninput="evaluarLimiteVA()">
                </div>
                
                <div class="input-group">
                    <label>Vista Atrás (+)</label>
                    <input type="number" id="vistaAtras" step="0.001" placeholder="Ej: 1.250" oninput="evaluarLimiteVA()">
                    <div class="alerta-predictiva" id="txtAlertaVA"></div>
                </div>

                <div class="input-group"><label>Cama de Apoyo (m)</label><input type="number" id="camaApoyo" step="0.001" placeholder="Ej: 0.100"></div>
                <div class="input-group"><label>Altura de Tubo (m)</label><input type="number" id="alturaTubo" step="0.001" placeholder="Ej: 0.200"></div>
                <div class="input-group full-width"><label>Progresivas cada (m)</label><input type="number" id="intervalo" step="0.01" value="10.000" placeholder="Ej: 5.000"></div>
            </div>
        </div>

        <button class="btn-accion btn-generar" style="background-color: var(--primary-color); font-size: 1.3rem;" onclick="generarLibreta()">⚙️ GENERAR LIBRETA DE CAMPO</button>

        <!-- SECCIÓN TABLA (ORIGINAL) -->
        <div class="seccion-tabla" id="seccionTabla">
            <div class="res-ai" id="resAI">AI (Altura Instrumento): <span id="txtAI">0.000</span></div>
            <div class="table-wrapper">
                <table id="tablaAlcantarillado">
                    <thead>
                        <tr>
                            <th style="width: 15%;">PROG.</th>
                            <th style="width: 25%;">LEER ZANJA<span class="th-info">(Excavación)</span></th>
                            <th style="width: 25%;">LEER LOMO<span class="th-info" id="infoTubo">Tubo + Cama</span></th>
                            <th style="width: 17%; color: #aaa;">Cota Zanja</th>
                            <th style="width: 18%; color: #aaa;">Cota Lomo</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla"></tbody>
                </table>
            </div>
            <button class="btn-accion btn-excel" id="btnExcel" onclick="exportarXLSX()">📥 Descargar a Excel (.xlsx)</button>
        </div>

    </div>

    <!-- CALCULADORA FLOTANTE (ORIGINAL ACTUALIZADA) -->
    <div class="btn-calculadora-flotante" onclick="toggleCalculadora()">🧮</div>
    <div class="calculadora-modal" id="calculadoraModal">
        <div class="calc-header"><span>CALC. RÁPIDA</span><button onclick="toggleCalculadora()">X</button></div>
        <input type="text" id="calcDisplay" disabled>
        <div class="calc-grid">
            <button onclick="calcInput('7')">7</button><button onclick="calcInput('8')">8</button><button onclick="calcInput('9')">9</button><button onclick="calcInput('/')">÷</button>
            <button onclick="calcInput('4')">4</button><button onclick="calcInput('5')">5</button><button onclick="calcInput('6')">6</button><button onclick="calcInput('*')">×</button>
            <button onclick="calcInput('1')">1</button><button onclick="calcInput('2')">2</button><button onclick="calcInput('3')">3</button><button onclick="calcInput('-')">-</button>
            <button onclick="calcClear()">C</button><button onclick="calcInput('0')">0</button><button onclick="calcInput('.')">.</button><button onclick="calcInput('+')">+</button>
            <button onclick="calcBackspace()" style="grid-column: span 2; background:#eee;">⌫ BORRAR</button>
            <button onclick="calcEval()" style="grid-column: span 2; background:var(--primary-color); color:#fff;">=</button>
        </div>
    </div>

    <script>
        // --- GESTIÓN DE PROYECTO Y BMs ---
        let proyectoActual = { nombre: "", bms: [] };

        function cargarProyectoLocal() {
            const data = localStorage.getItem('cota100_proyecto_alcan');
            if(data) {
                proyectoActual = JSON.parse(data);
                document.getElementById('proyectName').value = proyectoActual.nombre;
                renderBMs();
            }
        }

        function saveProyecto() {
            proyectoActual.nombre = document.getElementById('proyectName').value;
            localStorage.setItem('cota100_proyecto_alcan', JSON.stringify(proyectoActual));
        }

        function addBM() {
            const name = document.getElementById('newBMName').value.toUpperCase();
            const cota = parseFloat(document.getElementById('newBMCota').value);
            if(!name || isNaN(cota)) { alert("Ingresa nombre y cota válidos."); return; }
            
            proyectoActual.bms.push({ nombre: name, cota: cota });
            document.getElementById('newBMName').value = "";
            document.getElementById('newBMCota').value = "";
            saveProyecto();
            renderBMs();
        }

        function deleteBM(index) {
            proyectoActual.bms.splice(index, 1);
            saveProyecto();
            renderBMs();
        }

        function renderBMs() {
            const list = document.getElementById('listaBMs');
            const select = document.getElementById('selectBMProyecto');
            list.innerHTML = "";
            select.innerHTML = '<option value="">-- Seleccionar de Proyecto --</option>';

            proyectoActual.bms.forEach((bm, i) => {
                // Llenar lista visual
                list.innerHTML += `
                    <div class="bm-item">
                        <div class="bm-info"><strong>${bm.nombre}</strong><span>Elev: ${bm.cota.toFixed(3)} m</span></div>
                        <button class="btn-delete-bm" onclick="deleteBM(${i})">🗑️</button>
                    </div>`;
                // Llenar selector de campo
                select.innerHTML += `<option value="${bm.cota}">${bm.nombre} (${bm.cota.toFixed(3)})</option>`;
            });
        }

        function seleccionarBM(cota) {
            if(cota) document.getElementById('cotaBM').value = parseFloat(cota).toFixed(3);
        }

        function togglePanel(id) {
            const p = document.getElementById(id);
            p.style.display = p.style.display === "none" ? "block" : "none";
        }

        // --- LÓGICA ORIGINAL (RESPETADA) ---
        function autocalcularTramo() {
            let ci = parseFloat(document.getElementById('cotaIni').value); let cf = parseFloat(document.getElementById('cotaFin').value);
            let d = parseFloat(document.getElementById('distTotal').value); let p = parseFloat(document.getElementById('pte').value);
            let nulos = 0; if(isNaN(ci)) nulos++; if(isNaN(cf)) nulos++; if(isNaN(d)) nulos++; if(isNaN(p)) nulos++;
            if (nulos !== 1) { alert("Deja exactamente UNA casilla vacía."); return; }
            if (isNaN(p)) { document.getElementById('pte').value = (((cf - ci) / d) * 100).toFixed(3); } 
            else if (isNaN(cf)) { document.getElementById('cotaFin').value = (ci + ((p / 100) * d)).toFixed(3); }
            else if (isNaN(ci)) { document.getElementById('cotaIni').value = (cf - ((p / 100) * d)).toFixed(3); }
            else if (isNaN(d)) { document.getElementById('distTotal').value = Math.abs(((cf - ci) / p) * 100).toFixed(3); }
            evaluarLimiteVA();
        }

        function evaluarLimiteVA() {
            let ci = parseFloat(document.getElementById('cotaIni').value);
            let cf = parseFloat(document.getElementById('cotaFin').value);
            let bm = parseFloat(document.getElementById('cotaBM').value);
            let va = parseFloat(document.getElementById('vistaAtras').value);
            let alerta = document.getElementById('txtAlertaVA');
            if (!isNaN(ci) && !isNaN(cf) && !isNaN(bm)) {
                let cotaMinima = Math.min(ci, cf); 
                let limiteVA = 5.000 - bm + cotaMinima; 
                if (limiteVA < 0) { alerta.innerText = "⚠️ BM muy alto."; }
                else { alerta.innerText = "Máx sugerido: " + limiteVA.toFixed(3) + "m"; }
            }
        }

        function generarLibreta() {
            let ci = parseFloat(document.getElementById('cotaIni').value); let d = parseFloat(document.getElementById('distTotal').value); let p = parseFloat(document.getElementById('pte').value);
            if(isNaN(ci) || isNaN(d) || isNaN(p)) { alert("Faltan datos de Diseño."); return; }
            let bm = parseFloat(document.getElementById('cotaBM').value); let va = parseFloat(document.getElementById('vistaAtras').value);
            let cama = parseFloat(document.getElementById('camaApoyo').value) || 0; let altura = parseFloat(document.getElementById('alturaTubo').value) || 0;
            let intervalo = parseFloat(document.getElementById('intervalo').value);
            if(isNaN(bm) || isNaN(va)) { alert("Faltan datos de Campo."); return; }

            document.getElementById('infoTubo').innerText = `(Cama ${cama.toFixed(2)} + Tubo ${altura.toFixed(2)})`;
            let ai = bm + va;
            document.getElementById('txtAI').innerText = ai.toFixed(3);
            let tbody = document.getElementById('cuerpoTabla');
            tbody.innerHTML = "";

            for(let i=0; i <= d; i += intervalo) {
                let cotaZanja = ci + ((p / 100) * i);
                let cotaLomo = cotaZanja + cama + altura;
                tbody.innerHTML += `<tr><td>0+${i.toString().padStart(3,'0')}</td><td>${(ai-cotaZanja).toFixed(3)}</td><td>${(ai-cotaLomo).toFixed(3)}</td><td>${cotaZanja.toFixed(3)}</td><td>${cotaLomo.toFixed(3)}</td></tr>`;
            }
            document.getElementById('seccionTabla').style.display = 'block';
            document.getElementById('btnExcel').style.display = 'block';
        }

        function exportarXLSX() {
            let wb = XLSX.utils.table_to_book(document.getElementById("tablaAlcantarillado"));
            XLSX.writeFile(wb, "Libreta_Alcantarillado.xlsx");
        }

        function toggleCalculadora() { const m = document.getElementById('calculadoraModal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function calcInput(v) { document.getElementById('calcDisplay').value += v; }
        function calcClear() { document.getElementById('calcDisplay').value = ''; }
        function calcBackspace() { let d = document.getElementById('calcDisplay'); d.value = d.value.slice(0, -1); }
        function calcEval() { try { let res = new Function('return ' + document.getElementById('calcDisplay').value)(); document.getElementById('calcDisplay').value = res.toFixed(3); } catch(e) { document.getElementById('calcDisplay').value = 'Error'; } }
    </script>
</body>
</html>
